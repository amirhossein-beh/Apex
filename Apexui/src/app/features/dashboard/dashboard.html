<div class="flex flex-col gap-4">

  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="col-span-1">
      <p-card>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-gray-500 m-0">Total Clients</p>
            <p class="text-3xl font-bold m-0">{{ clients.length }}</p>
          </div>
          <i class="pi pi-desktop text-4xl text-blue-600"></i>
        </div>
      </p-card>
    </div>

    <div class="col-span-1">
      <p-card>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-gray-500 m-0">Online</p>
            <p class="text-3xl font-bold m-0 text-green-500">{{ onlineCount }}</p>
          </div>
          <i class="pi pi-check-circle text-4xl text-green-500"></i>
        </div>
      </p-card>
    </div>

    <div class="col-span-1">
      <p-card>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-gray-500 m-0">Offline</p>
            <p class="text-3xl font-bold m-0 text-red-500">{{ offlineCount }}</p>
          </div>
          <i class="pi pi-times-circle text-4xl text-red-500"></i>
        </div>
      </p-card>
    </div>
  </div>

  <!-- Clients Table -->
  <p-card header="Clients">
    <p-table [value]="clients" [loading]="loading" stripedRows>
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Location</th>
          <th>Version</th>
          <th>Status</th>
          <th>Last Seen</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-client>
        <tr>
          <td>{{ client.name }}</td>
          <td>{{ client.location }}</td>
          <td>{{ client.clientVersion ?? '---' }}</td>
          <td>
            <p-tag
              [value]="client.status"
              [severity]="client.status == 'ONLINE' ? 'success' : 'danger'"
            />
          </td>
          <td>{{ client.lastSeen | date:'yyyy/MM/dd HH:mm' }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center">No clients found</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

</div>
