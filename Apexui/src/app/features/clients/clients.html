<p-toast />
<p-confirmDialog />

<p-card header="Clients Management">

  <p-table [value]="clients" [loading]="loading" stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Location</th>
        <th>Version</th>
        <th>Status</th>
        <th>Last Seen</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-client>
      <tr>
        <td>{{ client.name }}</td>
        <td>{{ client.location }}</td>
        <td>{{ client.clientVersion ?? '-' }}</td>
        <td>
          <p-tag
            [value]="client.status"
            [severity]="client.status === 'ONLINE' ? 'success' : 'danger'" />
        </td>
        <td>{{ client.lastSeen | date:'yyyy/MM/dd HH:mm' }}</td>
        <td>
          <div class="flex gap-2">
            <!-- Commands -->
            <p-button
              icon="pi pi-play"
              [rounded]="true" [text]="true"
              severity="success"
              pTooltip="Start App"
              [disabled]="client.status === 'OFFLINE'"
              (onClick)="sendCommand(client, 'APP_START')" />

            <p-button
              icon="pi pi-stop"
              [rounded]="true" [text]="true"
              severity="warn"
              pTooltip="Stop App"
              [disabled]="client.status === 'OFFLINE'"
              (onClick)="sendCommand(client, 'APP_STOP')" />

            <p-button
              icon="pi pi-refresh"
              [rounded]="true" [text]="true"
              severity="info"
              pTooltip="Restart App"
              [disabled]="client.status === 'OFFLINE'"
              (onClick)="sendCommand(client, 'APP_RESTART')" />

            <!-- Edit -->
            <p-button
              icon="pi pi-pencil"
              pTooltip="Rename client"
              [rounded]="true" [text]="true"
              (onClick)="openEditDialog(client)" />

            <!-- Install Key -->
            <p-button
              icon="pi pi-key"
              [rounded]="true" [text]="true"
              severity="help"
              pTooltip="Generate Install Key"
              (onClick)="generateKey(client)" />

            <!-- Delete -->
            <p-button
              icon="pi pi-trash"
              [rounded]="true" [text]="true"
              severity="danger"
              (onClick)="confirmDelete(client)" />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center">No clients found</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<!-- Edit Dialog -->
<p-dialog
  header="Edit Client"
  [(visible)]="editDialogVisible"
  [style]="{ width: '400px' }"
  [modal]="true">

  <div class="flex flex-col gap-3 mt-2">
    <div class="flex flex-col gap-1">
      <label>Name</label>
      <input pInputText [(ngModel)]="editName" />
    </div>
    <div class="flex flex-col gap-1">
      <label>Location</label>
      <input pInputText [(ngModel)]="editLocation" />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancel" [text]="true" (onClick)="editDialogVisible = false" />
    <p-button label="Save" (onClick)="saveEdit()" />
  </ng-template>
</p-dialog>

<!-- Install Key Dialog -->
<p-dialog
  header="Install Key"
  [(visible)]="keyDialogVisible"
  [style]="{ width: '400px' }"
  [modal]="true">

  <div class="flex align-items-center gap-2 mt-2">
    <input pInputText [value]="generatedKey" readonly class="flex-1" />
    <p-button icon="pi pi-copy" (onClick)="copyKey()" />
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Close" (onClick)="keyDialogVisible = false" />
  </ng-template>
</p-dialog>
