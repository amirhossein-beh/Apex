  <div class="flex h-screen">

  <!-- Sidebar -->
  <div class="flex flex-col bg-gray-900 text-white" style="width: 250px; min-height: 100vh">

    <!-- Logo -->
    <div class="flex items-center justify-center py-4 border-bottom-1 border-gray-700">
      <span class="text-2xl font-bold text-primary">APEX</span>
    </div>

    <!-- Menu -->
    <nav class="flex flex-col gap-1 p-3 flex-1">
      <a routerLink="/dashboard" routerLinkActive="bg-primary"
         class="flex items-center gap-3 p-3 border-round cursor-pointer hover:bg-gray-700 no-underline text-white">
        <i class="pi pi-home"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/clients" routerLinkActive="bg-primary"
         class="flex items-center gap-3 p-3 border-round cursor-pointer hover:bg-gray-700 no-underline text-white">
        <i class="pi pi-desktop"></i>
        <span>Clients</span>
      </a>
      <a routerLink="/versions" routerLinkActive="bg-primary"
         class="flex items-center gap-3 p-3 border-round cursor-pointer hover:bg-gray-700 no-underline text-white">
        <i class="pi pi-upload"></i>
        <span>Versions</span>
      </a>
      <a routerLink="/traffic" routerLinkActive="bg-primary"
         class="flex items-center gap-3 p-3 border-round cursor-pointer hover:bg-gray-700 no-underline text-white">
        <i class="pi pi-car"></i>
        <span>Traffic</span>
      </a>
      <a routerLink="/users" routerLinkActive="bg-primary"
         class="flex items-center gap-3 p-3 border-round cursor-pointer hover:bg-gray-700 no-underline text-white">
        <i class="pi pi-users"></i>
        <span>Users</span>
      </a>
      <a routerLink="/deployments" routerLinkActive="bg-primary"
         class="flex align-items-center gap-3 p-3 border-round cursor-pointer hover:bg-gray-700 no-underline text-white">
        <i class="pi pi-send"></i>
        <span>Deployments</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="flex items-center justify-between p-3 border-top-1 border-gray-700">
      <div class="flex items-center gap-2">
        <p-avatar [label]="username.charAt(0).toUpperCase()" shape="circle" />
        <span class="text-sm">{{ username }}</span>
      </div>
      <p-button
        [icon]="'pi pi-sign-out'"
        [rounded]="true"
        [text]="true"
        [severity]="'danger'"
        (onClick)="logout()" />
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex flex-col flex-1 overflow-hidden">

    <!-- Header -->
    <div class="flex align-items-center px-4 py-3 bg-white border-bottom-1 border-gray-200 shadow-1">
      <span class="text-lg font-semibold text-gray-700">Apex Management Panel</span>
    </div>

    <!-- Page Content -->
    <div class="flex-1 overflow-auto p-4 bg-gray-50">
      <router-outlet />
    </div>

  </div>
</div>
