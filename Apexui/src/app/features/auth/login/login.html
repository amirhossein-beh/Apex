<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <p-card header="Apex Panel" [style]="{ width: '400px' }">

    <div class="flex flex-col gap-3">

      <div class="flex flex-col gap-1">
        <p-floatlabel variant="on">
          <label>Username</label>
          <input pInputText class="w-full" [(ngModel)]="username" />
        </p-floatlabel>
      </div>

      <div class="flex flex-col gap-1">
        <p-floatlabel variant="on">
          <p-password
            [(ngModel)]="password"
            [feedback]="false"
            [toggleMask]="true"
            inputId="password"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          <label for="password">password</label>
        </p-floatlabel>
      </div>

      @if (errorMessage) {
        <p-message severity="error" [life]=10000>{{ errorMessage }}</p-message>
      }

      <p-button
        label="Login"
        [loading]="loading"
        (onClick)="login()"
        styleClass="w-full" />
    </div>

  </p-card>
</div>
