<p-toast />
<p-confirmDialog />

<p-card header="Users Management">

  <ng-template pTemplate="header">
    <div class="flex justify-end p-3">
      <p-button
        label="Add User"
        icon="pi pi-plus"
        (onClick)="createDialogVisible = true" />
    </div>
  </ng-template>

  <p-table [value]="users" [loading]="loading" stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Status</th>
        <th>Created At</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.username }}</td>
        <td>
          <p-tag
            [value]="user.role"
            [severity]="roleSeverity(user.role)" />
        </td>
        <td>
          <p-tag
            [value]="user.active ? 'Active' : 'Inactive'"
            [severity]="user.active ? 'success' : 'secondary'" />
        </td>
        <td>{{ user.createdAt | date:'yyyy/MM/dd' }}</td>
        <td>
          <div class="flex gap-2">
            <p-button
              icon="pi pi-key"
              [rounded]="true" [text]="true"
              severity="warn"
              pTooltip="Change Password"
              (onClick)="openPasswordDialog(user)" />

            <p-button
              *ngIf="user.deletable"
              [icon]="user.active ? 'pi pi-ban' : 'pi pi-check'"
              [rounded]="true" [text]="true"
              [severity]="user.active ? 'warn' : 'success'"
              [pTooltip]="user.active ? 'Deactivate' : 'Activate'"
              (onClick)="toggleActive(user)" />

            <p-button
              *ngIf="user.deletable"
              icon="pi pi-trash"
              [rounded]="true" [text]="true"
              severity="danger"
              (onClick)="confirmDelete(user)" />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center">No users found</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<!-- Create User Dialog -->
<p-dialog
  header="Add New User"
  [(visible)]="createDialogVisible"
  [style]="{ width: '400px', height: '600px'}"
  [modal]="true">

  <div class="flex flex-col gap-3 mt-2">
    <div class="flex flex-col gap-1">
      <label>Username <span class="text-red-500">*</span></label>
      <input pInputText [(ngModel)]="createForm.username" />
    </div>

    <div class="flex flex-col gap-1">
      <label>Password <span class="text-red-500">*</span></label>
      <p-password [(ngModel)]="createForm.password" [toggleMask]="true" styleClass="w-full" />
    </div>

    <div class="flex flex-col gap-1">
      <label>Role <span class="text-red-500">*</span></label>
      <p-select
        [options]="roleOptions"
        [(ngModel)]="createForm.role"
        placeholder="Select role" />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancel" [text]="true" (onClick)="closeCreateDialog()" />
    <p-button
      label="Create"
      [disabled]="!createForm.username || !createForm.password || !createForm.role"
      (onClick)="createUser()" />
  </ng-template>
</p-dialog>

<!-- Change Password Dialog -->
<p-dialog
  header="Change Password"
  [(visible)]="passwordDialogVisible"
  [style]="{ width: '400px' }"
  [modal]="true">

  <div class="flex flex-col gap-1 mt-2">
    <label>New Password <span class="text-red-500">*</span></label>
    <p-password [(ngModel)]="newPassword" [toggleMask]="true" styleClass="w-full" />
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancel" [text]="true" (onClick)="passwordDialogVisible = false" />
    <p-button
      label="Save"
      [disabled]="!newPassword"
      (onClick)="changePassword()" />
  </ng-template>
</p-dialog>
